[build]
builder = "DOCKERFILE"
dockerfilePath = "pose_api/Dockerfile"

[deploy]
startCommand = "sh -c 'uvicorn main:app --host 0.0.0.0 --port ${PORT:-8080} --loop asyncio'"
healthcheckPath = "/health"
healthcheckTimeout = 600
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environments.production.variables]
PYTHON_VERSION = "3.14"
CORS_ORIGINS = "https://horsera.app,https://app.horsera.ai,http://localhost:5173,http://localhost:8080"
